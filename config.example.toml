[execution]
engine = "ig"

# Daemon mode — run live trading cycles periodically.
# Omit [daemon] section to use defaults (3600s interval, 5 max failures).
# [daemon]
# interval_secs = 3600              # seconds between trading cycles
# max_consecutive_failures = 5      # exit after N consecutive errors

# Risk limits — hard veto if any check fails (no orders placed).
# Omit [risk] section to disable risk checks entirely.
[risk]
max_gross_leverage = 2.5     # sum(|notional|) / NAV
max_position_pct = 0.40      # max single-instrument |notional| / NAV
max_drawdown_pct = 0.15      # max drawdown from peak NAV (15%)

# Overlay actions — bounded interventions applied before target generation.
# Actions modify weights after signal computation but before sizing/execution.
# Date-bounded actions expire automatically; Flatten is immediate (no expiry).
#
# [[overlays.actions]]
# action = "scale_exposure"
# scope = { asset_class = "gold" }
# factor = 0.5
# until = "2026-04-15"
#
# [[overlays.actions]]
# action = "freeze_entries"
# scope = "global"
# until = "2026-04-15"
#
# [[overlays.actions]]
# action = "flatten"
# scope = { instrument = "GBPUSD=X" }
# reason = "weekend risk"
#
# [[overlays.actions]]
# action = "disable_instrument"
# instrument = "SPY"
# until = "2026-04-15"

# Volatility overlay — deterministic triggers that emit global actions.
# Fires if any instrument hits a threshold. Severe → FreezeEntries, else → ScaleExposure.
#
# [overlays.volatility]
# enabled = true
# scale_factor = 0.5
# until_days = 1
# vol_short_days = 10
# vol_long_days = 60
# vol_ratio_threshold = 1.5
# severe_vol_ratio_threshold = 2.0
# atr_period = 14
# atr_pct_threshold = 0.02
# sigma_days = 60
# move_k = 1.5
# severe_move_k = 2.5
#
# Per-asset-class threshold overrides (any field omitted → uses global default).
# [overlays.volatility.gold]
# vol_ratio_threshold = 1.3
# scale_factor = 0.3
# until_days = 2
#
# [overlays.volatility.equity]
# vol_ratio_threshold = 1.8
# severe_vol_ratio_threshold = 2.5
#
# [overlays.volatility.forex]
# atr_pct_threshold = 0.015
# move_k = 1.2

# News overlay — deterministic actions from a local JSON feed file.
# Events are matched by date (point-in-time). Each event maps to an overlay action.
# No network ingestion; you manually populate the feed file.
#
# [overlays.news]
# enabled = true
# feed_path = "data/news_feed.json"
# default_until_days = 1

[execution.ig]
environment = "DEMO"
account_id = "Z69YJL"

# IG spread-bet sizing:
#   deal_size = (weight × NAV) / (price × ig_point_value)
#   FX major pairs (pip = 0.0001): ig_point_value = 10000
#   FX JPY pairs (pip = 0.01):    ig_point_value = 100
#   Equity/commodity per-point:    ig_point_value = 1

[execution.ig.instruments."SPY"]
epic = "IX.D.SPTRD.DAILY.IP"
min_size = 0.1
size_step = 0.1
ig_point_value = 1.0

[execution.ig.instruments."GC=F"]
epic = "CC.D.GC.USS.IP"
min_size = 1.0
size_step = 1.0
ig_point_value = 1.0

[execution.ig.instruments."GLD"]
epic = "UC.D.GLDUS.DAILY.IP"
min_size = 1.0
size_step = 1.0
ig_point_value = 1.0

[execution.ig.instruments."GBPUSD=X"]
epic = "CS.D.GBPUSD.TODAY.IP"
min_size = 0.5
size_step = 0.1
ig_point_value = 10000.0

[execution.ig.instruments."USDCHF=X"]
epic = "CS.D.USDCHF.TODAY.IP"
min_size = 0.5
size_step = 0.1
ig_point_value = 10000.0

[execution.ig.instruments."USDJPY=X"]
epic = "CS.D.USDJPY.TODAY.IP"
min_size = 0.5
size_step = 0.1
ig_point_value = 100.0

# LLM indicator agent (track-b feature).
# Omit [llm] section to use the default RSI-only indicator.
[llm]
base_url = "http://localhost:11434"   # Ollama/SGLang endpoint
model = "mychen76/Fin-R1:Q5"                   # Model name
temperature = 0.3                      # Sampling temperature
max_tokens = 4096                      # Max response tokens (thinking models need headroom for CoT)
timeout_secs = 120                     # Request timeout (thinking models are slow)
max_retries = 2                        # Retries on 5xx errors
prompt_path = "prompts/indicator_directional.md"  # External prompt file (optional, falls back to embedded)

# Signal blending (track-b feature).
# Combines TSMOM + indicator signals per asset class.
# Omit [blending] or set enabled = false for TSMOM-only mode.
#
# Production default: TSMOM-only. Fin-R1 + baseline prompt showed no evidence
# of alpha after IG spread costs over 2024-01-01 → 2025-03-31 (15-month eval).
# See PROGRESS.md ablation ladder for details. Keep enabled = false until a
# prompt/model A/B test demonstrates net-positive blended Sharpe.
[blending]
enabled = false

# Research weights — uncomment and set enabled = true to experiment.
# [blending.weights.gold]
# tsmom = 0.50
# indicator = 0.50
# mode = "blend"               # "blend" (default) or "protective_override"
#                               # protective_override: indicator only intervenes on
#                               # sign flips (true directional disagreements)
#
# [blending.weights.equity]
# tsmom = 1.00
# indicator = 0.00
#
# [blending.weights.forex]
# tsmom = 0.10
# indicator = 0.90

# Confidence gating — reject low-conviction indicator signals before blending.
# Omit [blending.gating] to use all indicator signals (no gating).
# [blending.gating]
# min_confidence = 0.70       # Minimum indicator confidence (0.0 = no gate)
# min_abs_strength = 0.30     # Minimum |strength| (0.0 = no gate)

# Daemon mode — periodic trading cycles.
# Configure interval and failure thresholds for `quantbot daemon`.
# Omit [daemon] section to use defaults (3600s interval, 5 max failures).
#
# [daemon]
# interval_secs = 3600              # Seconds between trading cycles
# max_consecutive_failures = 5      # Exit after N consecutive errors
# max_cycle_secs = 300              # Per-cycle timeout (prevents hangs)
# auto_update_data = false          # Auto-update CSVs from Yahoo once per day
# update_timeout_secs = 300         # Timeout for data update

# Notifications — fire-and-forget alerts on key events.
# Events: daemon_start, daemon_stop, daemon_error, data_update_failed,
#         severe_vol_trigger, overlay_applied, trade_executed
#
# [notify]
# cmd = "/path/to/alert.sh"         # Shell command (receives QUANTBOT_EVENT, QUANTBOT_DETAIL, QUANTBOT_TIMESTAMP)
# webhook_url = "https://hooks.slack.com/services/..."  # HTTP POST with JSON payload
# timeout_secs = 5                  # Timeout for cmd / webhook
